name: Generate code ownership

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

jobs:
  generate:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run script
        shell: pwsh
        run: ./scripts/generate-code-ownership.ps1

      - name: Commit updated CSV
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/code_ownership.csv
          git commit -m "Update code ownership data"
          git push
        continue-on-error: true